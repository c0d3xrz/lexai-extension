<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1A2F"/>
      <stop offset="100%" style="stop-color:#0D3B6E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <rect x="8" y="8" width="112" height="112" rx="18" fill="none" stroke="#1E5FA8" stroke-width="1.5" opacity="0.6"/>
  <!-- L letter stylized -->
  <path d="M28 36 L28 92 L78 92 L78 80 L42 80 L42 36 Z" fill="#1E90FF" filter="url(#glow)" opacity="0.95"/>
  <!-- AI dot accent -->
  <circle cx="90" cy="42" r="8" fill="#00BFFF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="90" cy="42" r="4" fill="#FFFFFF" opacity="0.95"/>
  <!-- Scan lines decoration -->
  <line x1="28" y1="54" x2="20" y2="54" stroke="#1E90FF" stroke-width="2" opacity="0.5"/>
  <line x1="28" y1="66" x2="16" y2="66" stroke="#1E90FF" stroke-width="2" opacity="0.3"/>
</svg>
